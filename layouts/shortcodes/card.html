{{ $name := .Get "name" }}
{{ $set := .Get "set" | default "" }}

<div class="card-inline" data-card-name="{{ $name }}" data-card-set="{{ $set }}">
  <span class="card-name">{{ $name }}</span>
</div>

<script>
(function() {
  function loadCardImage(cardEl) {
    const name = cardEl.getAttribute('data-card-name');
    const set = cardEl.getAttribute('data-card-set') || '';
    
    let url = `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`;
    if (set) url += `&set=${encodeURIComponent(set)}`;
    
    fetch(url)
      .then(r => r.json())
      .then(data => {
        const imgUrl = data.image_uris?.normal || data.card_faces?.[0]?.image_uris?.normal;
        if (imgUrl) {
          const img = document.createElement('img');
          img.src = imgUrl;
          img.alt = name;
          img.className = 'card-image';
          img.loading = 'lazy';
          cardEl.insertBefore(img, cardEl.firstChild);
        }
      })
      .catch(e => console.warn(`Card image error for ${name}:`, e.message));
  }
  
  // Load immediately if DOM ready, or wait
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.card-inline[data-card-name]').forEach(loadCardImage);
    });
  } else {
    document.querySelectorAll('.card-inline[data-card-name]').forEach(loadCardImage);
  }
})();
</script>
